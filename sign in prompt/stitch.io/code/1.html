<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Material Design Sign In - Variant 1</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec7f13",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Material-style input focus state */
        .material-input:focus-within label {
            color: #ec7f13;
            transform: translateY(-1.5rem) scale(0.85);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Top Navigation Bar -->
<header class="w-full px-6 lg:px-12 py-4 flex items-center justify-between border-b border-primary/10 bg-white/50 dark:bg-black/20 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-2">
<div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">key</span>
</div>
<h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">WarmAuth</h2>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Home</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">About</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Support</a>
</nav>
<div class="flex items-center gap-4">
<button class="hidden sm:block text-sm font-semibold text-primary hover:text-primary/80 transition-colors px-4 py-2">Log In</button>
<button class="bg-primary hover:bg-primary/90 text-white text-sm font-bold px-6 py-2.5 rounded-lg transition-all shadow-sm hover:shadow-md">
                Sign Up
            </button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-6 lg:p-12 relative overflow-hidden">
<!-- Abstract Background Elements -->
<div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/10 rounded-full blur-3xl -z-10"></div>
<div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<!-- Auth Card -->
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900/50 backdrop-blur-sm border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl p-8 lg:p-10">
<!-- Card Header -->
<div class="text-center mb-10">
<h1 class="text-3xl font-black tracking-tight mb-3 text-slate-900 dark:text-slate-100">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please enter your details to access your account.</p>
</div>
<!-- Sign In Form -->
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors text-xl">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-background-light dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" id="email" name="email" placeholder="e.g. name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors text-xl">lock</span>
</div>
<input class="w-full pl-11 pr-12 py-3.5 bg-background-light dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Policy -->
<div class="flex items-center gap-3 px-1">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-xs text-slate-500 dark:text-slate-400 font-medium" for="remember">Remember this device for 30 days</label>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-800"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-400 dark:text-slate-500 font-medium tracking-widest">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4 mb-10">
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google colorful brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4jBa9S4kljzb9-89U6pyFBwjk1eMaDVPybk6i0V4GEGY2njxogrweXeVk8K3uFgrDFLpuW_t4XqBggaKNlaYrbWwRNseiss8dJWdtJuR1DAYv_KC9A-lWdJtmtzfQHgdXTAYKaBrheKj0GVFbn1j1a1qTNq-nfmqL4RcRF7OYikyp8Q00yDi_wovibXDsimRrqVKfSkBTd-eJhrkaMVJkWglxG8auLCA1IX3BZ0ElnuxNCv9HX3V1aXvuUMPuqiWab8Y54fjDQRu0"/>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-xl">language</span>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Github</span>
</button>
</div>
<!-- Footer Link -->
<p class="text-center text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline transition-all" href="#">Create account</a>
</p>
</div>
</main>
<!-- Simple Footer -->
<footer class="w-full px-6 py-8 flex flex-col items-center gap-4 text-slate-400">
<div class="flex items-center gap-6">
<a class="text-xs hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-xs hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-xs hover:text-primary transition-colors" href="#">Contact Us</a>
</div>
<p class="text-[10px] uppercase tracking-widest font-semibold opacity-50">© 2024 WarmAuth Security Systems</p>
</footer>
</body></html>
