<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Material Design Sign In Variant 2</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec7f13",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221910",
                        "peach-accent": "#fdf2e9",
                        "sand-neutral": "#e7dbcf"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6">
<!-- Main Sign-In Card (Elevated Material Design) -->
<div class="w-full max-w-[440px] bg-white dark:bg-zinc-900 shadow-xl rounded-xl overflow-hidden border border-sand-neutral/30 dark:border-white/5">
<!-- Peach-Colored Header Area -->
<div class="bg-peach-accent dark:bg-primary/10 px-8 pt-10 pb-8 text-center relative">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary text-white mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl">lock_open</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Welcome Back</h1>
<p class="text-slate-600 dark:text-slate-400 mt-2 text-sm">Please enter your details to sign in</p>
<!-- Decorative Pattern Element -->
<div class="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-6xl rotate-12">shield</span>
</div>
</div>
<!-- Form Section -->
<div class="p-8 space-y-6">
<!-- Email Field -->
<div class="relative">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1 ml-1" for="email">
                    Email Address
                </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3.5 bg-transparent border border-sand-neutral dark:border-white/10 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative">
<div class="flex justify-between items-end mb-1 ml-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400" for="password">
                        Password
                    </label>
<a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-10 pr-12 py-3.5 bg-transparent border border-sand-neutral dark:border-white/10 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-sand-neutral text-primary focus:ring-primary/30 cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer select-none" for="remember-me">
                    Remember this device
                </label>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-4 rounded-lg shadow-lg shadow-primary/20 transform transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<!-- Social Login Divider -->
<div class="relative py-2">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-sand-neutral dark:border-white/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest font-medium">
<span class="bg-white dark:bg-zinc-900 px-3 text-slate-400">Or continue with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-2.5 px-4 border border-sand-neutral dark:border-white/10 rounded-lg hover:bg-slate-50 dark:hover:bg-white/5 transition-colors text-sm font-medium text-slate-700 dark:text-slate-300">
<img class="w-5 h-5 mr-2" data-alt="Google colorful logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBU7NN8QoNMUC01AqaW-WQxDHP2vK239hT0JK0gYjJ_pd0ASlgt8AkRZKfp-9gFduXbgCF3Eh8ItIWKvhrxHVNab2GfShFYrcndwyK4TlAMjzwVIO3PnSA7LgfYR3SQ58VSpxrfKHj6gWu-lGOp3i6noGI2tOV5eJlvDcwvOmRZBrDysigGfH9oIE8gaCNbArIWsgNIroDxBWTM-fFPkjkZnuE75zY_spjFmHt8rzPML3qcKzGAlE4S1zvdRUPHoY6HOc9y6x0ogc8f"/>
                    Google
                </button>
<button class="flex items-center justify-center py-2.5 px-4 border border-sand-neutral dark:border-white/10 rounded-lg hover:bg-slate-50 dark:hover:bg-white/5 transition-colors text-sm font-medium text-slate-700 dark:text-slate-300">
<img class="w-5 h-5 mr-2" data-alt="Github dark brand icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvrG6cNsO1btr3cwwAlOUxdlJEIpPtPTz0b6zkQ0-xbuoNEE9Y839bqQQXuprb6TmHpAcVvM6EK9lZcp58QvZ5tTQslRD5XzYZwvGN5YEQhruJIoKufGmKAU1GvUq1ha_J4VBDHJtO5EPL27zG3PQoRRAPeZlmKdcPCQsZNeb6fINSwSKr8C5KhW0OyADpV3Tf7cBLk_4exFj97NjQmCfv2vBZXV7p3BW7eV5cUa0n4wnGlxNMqSPdi7LdfxrPXcugIhhgoC4MyQ6p"/>
                    GitHub
                </button>
</div>
</div>
<!-- Card Footer -->
<div class="bg-slate-50 dark:bg-white/5 px-8 py-5 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                New here? 
                <a class="font-bold text-primary hover:underline decoration-2 underline-offset-4" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Help / Support Links (Floating Bottom Right) -->
<div class="fixed bottom-6 right-8 hidden lg:flex gap-6">
<a class="text-xs font-medium text-slate-400 hover:text-primary transition-colors uppercase tracking-widest flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">help</span>
            Support
        </a>
<a class="text-xs font-medium text-slate-400 hover:text-primary transition-colors uppercase tracking-widest flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">policy</span>
            Privacy
        </a>
</div>
</body></html>
